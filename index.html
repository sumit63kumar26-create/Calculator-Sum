<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body> 

<div class="div1"
    <a class="btn6" href="index.html">Calculator</a>
    <a class="btn7"href="developer.html">Developer</a>
  </div>
  
<div class="calculator">
  <input type="text" id="display" disabled>  <div class="buttons">
    <button onclick="clearAll()">AC</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="press('%')">%</button>
    <button class="btn1"onclick="press('/')">÷</button><button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="btn2"onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="btn3"onclick="press('-')">-</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="btn4"onclick="press('+')">+</button>

<button onclick="press('.')">.</button>
<button onclick="press('0')">0</button>
<button class="btn5"onclick="calculate()">=</button>

  </div>
</div><script src="main.js"></script></body>
</html>
